steps:
  # ─── 1. Build Backend Image ──────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/nexusswarm-backend:latest'
      - './backend'

  # ─── 2. Push Backend Image ───────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/nexusswarm-backend:latest'

  # ─── 3. Deploy Backend to Cloud Run ──────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'nexusswarm-backend'
      - '--image=${_LOCATION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/nexusswarm-backend:latest'
      - '--region=${_LOCATION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--add-cloudsql-instances=${_DB_CONNECTION}'
      - '--set-env-vars=^;^APP_ENV=production;TRUSTED_HOSTS=localhost,127.0.0.1,testserver,nexusswarm-backend-titbewudzq-uc.a.run.app,nexusswarm-backend-537381825142.us-central1.run.app;CORS_ALLOWED_ORIGINS=https://nexusswarm-frontend-titbewudzq-uc.a.run.app,https://nexusswarm-frontend-537381825142.us-central1.run.app,http://localhost:3000,http://127.0.0.1:3000;NIM_ORCHESTRATOR_MODEL=deepseek-ai/deepseek-v4-flash;NIM_MANAGER_MODEL=qwen/qwen2.5-coder-32b-instruct;NIM_WORKER_MODEL=nv-mistralai/mistral-nemo-12b-instruct;GCS_BUCKET=${_GCS_BUCKET};DATABASE_URL=postgresql+asyncpg://postgres:$$DB_PASSWORD@/nexusswarm?host=/cloudsql/${_DB_CONNECTION}'
      - '--set-secrets=NVIDIA_API_KEY=nexusswarm-nvidia-key:latest,DB_PASSWORD=nexusswarm-db-pass:latest'

substitutions:
  _LOCATION: 'us-central1'
  _REPO: 'nexusswarm'
  _DB_CONNECTION: 'mystical-surfer-501613-p5:us-central1:nexusswarm-db'
  _GCS_BUCKET: 'nexusswarm-outputs-mystical-surfer-501613-p5'
