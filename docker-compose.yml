version: "3.9"

services:
  # ─────────────────────────────────────────
  # FRONTEND — React + Vite
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
        - VITE_WS_URL=ws://localhost:8000
    container_name: nexusswarm-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - nexusswarm-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # BACKEND — FastAPI + AutoGen
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexusswarm-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=${REDIS_URL}
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - workspace:/app/workspace
    networks:
      - nexusswarm-net
    restart: unless-stopped

  # ─────────────────────────────────────────
  # REDIS — Pipeline state + pub/sub bus
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexusswarm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - nexusswarm-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────
  # POSTGRESQL — Task state + audit log
  # ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: nexusswarm-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - nexusswarm-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexusswarm"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ─────────────────────────────────────────
  # NGINX — Reverse proxy
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nexusswarm-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - nexusswarm-net
    restart: unless-stopped

# ─────────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────────
volumes:
  redis-data:
  pg-data:
  workspace:

# ─────────────────────────────────────────
# NETWORKS
# ─────────────────────────────────────────
networks:
  nexusswarm-net:
    driver: bridge
